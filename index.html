<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Split Fácil PWA</title>

    <link
      rel="icon"
      type="image/png"
      href="./assets/icons/android/icon-192x192.png"
    />
    <link
      rel="apple-touch-icon"
      href="./assets/icons/android/icon-192x192.png"
    />

    <link rel="manifest" href="./manifest.json" />
    <meta name="theme-color" content="#ffffff" />

    <link rel="stylesheet" href="./styles.css" />

    <!-- Firebase (necesario para push notifications) -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-messaging.js"></script>
  </head>
  <body>
    <div class="app-container">
      <!-- Navbar Superior -->
      <header class="app-navbar">
        <img
          src="./assets/icons/android/icon-192x192.png"
          alt="Logo de Split Fácil"
          class="navbar-logo"
        />

        <div class="navbar-content">
          <div class="navbar-title-row">
            <h1>Split Fácil</h1>
            <span id="connectionStatus" class="status-badge status-checking"
              >Revisando...</span
            >
          </div>

          <p>Divide gastos entre amigos</p>
        </div>
        <!-- Botón de notificaciones en el header -->
        <button id="notifBtn" onclick="activarNotificaciones()" title="Activar notificaciones" style="
          background: none;
          border: none;
          font-size: 1.5rem;
          cursor: pointer;
          padding: 0.25rem;
          border-radius: 50%;
          transition: background 0.2s;
        ">🔔</button>
      </header>

      <!-- Contenedor de vistas -->
      <main class="app-content">
        <!-- Vista: Participantes -->
        <section id="view-participants" class="view active">
          <div class="view-header">
            <h2>Participantes</h2>
          </div>

          <div class="form-group">
            <input
              id="participantName"
              placeholder="Nombre del participante"
              type="text"
            />
            <button id="addParticipantBtn" class="btn-primary">Agregar</button>
          </div>

          <ul id="participantsList" class="participants-list"></ul>
        </section>

        <!-- Vista: Agregar Gasto -->
        <section id="view-add-expense" class="view">
          <div class="view-header">
            <h2>Nuevo Gasto</h2>
          </div>

          <div class="form-group">
            <input
              id="expenseDescription"
              placeholder="Descripción del gasto"
              type="text"
            />
          </div>

          <div class="form-group">
            <input
              id="expenseAmount"
              placeholder="Monto en pesos"
              type="number"
            />
          </div>

          <div class="form-group">
            <label for="expensePayer">¿Quién pagó?</label>
            <select id="expensePayer"></select>
          </div>

          <div class="form-group">
            <label>¿Quiénes deben pagar? (selecciona varios)</label>
            <div
              id="expenseParticipantsContainer"
              class="participants-selector"
            ></div>
          </div>

          <button id="addExpenseBtn" class="btn-primary btn-large">
            Registrar gasto
          </button>
        </section>

        <!-- Vista: Gastos -->
        <section id="view-expenses" class="view">
          <div class="view-header">
            <h2>Historial de Gastos</h2>
            <div class="balance-summary" id="balanceSummary"></div>
          </div>

          <ul id="expensesList" class="expenses-list"></ul>
        </section>
      </main>

      <!-- Menú inferior de navegación -->
      <nav class="app-menu">
        <button
          id="menu-participants"
          class="menu-btn active"
          data-view="participants"
        >
          <img
            src="./assets/icons/android/people.png"
            alt="Participantes"
            class="menu-icon"
          />
        </button>

        <button id="menu-add-expense" class="menu-btn" data-view="add-expense">
          <img
            src="./assets/icons/android/plus.png"
            alt="Agregar Gasto"
            class="menu-icon"
          />
        </button>

        <button id="menu-expenses" class="menu-btn" data-view="expenses">
          <img
            src="./assets/icons/android/list.png"
            alt="Gastos"
            class="menu-icon"
          />
        </button>
      </nav>
    </div>

    <!-- Modal de edición de gastos -->
    <div id="editModal" class="modal" style="display: none">
      <div class="modal-content">
        <h2>Editar gasto</h2>
        <input
          id="editExpenseDescription"
          placeholder="Descripción del gasto"
        />
        <input id="editExpenseAmount" type="number" placeholder="Monto" />
        <select id="editExpensePayer"></select>
        <div
          id="editExpenseParticipantsContainer"
          class="participants-selector"
        ></div>
        <div class="modal-buttons">
          <button id="saveExpenseBtn">Guardar</button>
          <button id="cancelEditBtn">Cancelar</button>
        </div>
      </div>
    </div>
    <!-- Modal para mostrar el token FCM -->
    <div id="tokenModal" class="modal" style="display: none">
      <div class="modal-content">
        <h2>🔔 Notificaciones activadas</h2>
        <p style="margin: 0.5rem 0; font-size: 0.85rem; color: #555;">
          Copia este token y úsalo en Firebase Console para enviar una notificación de prueba:
        </p>
        <textarea id="tokenText" readonly style="
          width: 100%;
          height: 80px;
          font-size: 0.7rem;
          padding: 0.5rem;
          border-radius: 6px;
          border: 1px solid #ccc;
          resize: none;
          box-sizing: border-box;
        "></textarea>
        <button onclick="copiarToken()" class="btn-primary" style="margin-top: 0.75rem; width: 100%;">
          Copiar token
        </button>
        <button onclick="document.getElementById('tokenModal').style.display='none'" style="
          margin-top: 0.5rem;
          width: 100%;
          background: none;
          border: 1px solid #ccc;
          padding: 0.5rem;
          border-radius: 6px;
          cursor: pointer;
        ">
          Cerrar
        </button>
      </div>
    </div>

    <script src="./storage.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
