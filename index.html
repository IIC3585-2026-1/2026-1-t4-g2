<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Split Fácil PWA</title>

  <link rel="manifest" href="./manifest.json" />

  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <main class="app">
    <h1>Split Fácil</h1>
    <p>Divide gastos entre amigos, incluso sin conexión.</p>

    <section>
      <h2>Participantes</h2>
      <input id="participantName" placeholder="Nombre" />
      <button id="addParticipantBtn">Agregar participante</button>
      <ul id="participantsList"></ul>
    </section>

    <section>
      <h2>Gastos</h2>
      <input id="expenseDescription" placeholder="Descripción del gasto" />
      <input id="expenseAmount" type="number" placeholder="Monto" />
      <select id="expensePayer"></select>
      <button id="addExpenseBtn">Agregar gasto</button>
      <ul id="expensesList"></ul>
    </section>

    <section>
      <h2>Resultado</h2>
      <ul id="balancesList"></ul>
    </section>

    <section>
      <button id="enableNotificationsBtn">Activar recordatorios</button>
      <p id="connectionStatus"></p>
    </section>
  </main>

  <script src="./storage.js"></script>
  <script src="./app.js"></script>
</body>
</html>
